{% extends "base.html" %}

{% block title %}{{ blog.title }}{% endblock %}

{% block content %}

<div class="container mt-5">

    <!-- BLOG TITLE -->
    <h1 class="mb-3">{{ blog.title }}</h1>

    <!-- META INFO -->
    <p class="text-muted">
        By {{ blog.author }} • {{ blog.date }}
    </p>

    <!-- IMAGE -->
    {% if blog.image %}
        <img src="{{ blog.image.url }}" class="img-fluid mb-4" alt="{{ blog.title }}">
    {% endif %}

    <!-- CONTENT -->
    <div class="blog-content">
        {{ blog.content|safe }}
    </div>

</div>

{% endblock %}
