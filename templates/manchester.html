{% extends 'base.html' %}
{% load static %}

{% block title %}Manchester Big Event | Prayer Power Network{% endblock %}

{% block extra_css %}
<style>
  /* Countdown section with background image */
  .countdown-hero {
    background: url('{% static "images/manchester-flyer.jpg" %}') center center / cover no-repeat;
    position: relative;
    min-height: 70vh;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
  }
  .countdown-hero .overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.5);
  }
  .countdown-content {
    position: relative;
    z-index: 2;
    color: white;
    padding: 2rem;
  }
  .countdown-content h1 {
    font-size: 3rem;
    margin-bottom: 1rem;
  }
  .countdown-box {
    background: rgba(0,0,0,0.7);
    padding: 1.5rem;
    border-radius: 2rem;
    display: inline-block;
    margin-top: 1rem;
  }
  .countdown {
    font-size: 2.5rem;
    font-weight: bold;
    font-family: monospace;
    letter-spacing: 5px;
  }
  /* Flier section */
  .flier-section {
    max-width: 800px;
    margin: 2rem auto;
    padding: 1rem;
  }
  .flier-section img {
    width: 100%;
    border-radius: 1rem;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
  }
  @media (max-width: 768px) {
    .countdown-content h1 { font-size: 1.8rem; }
    .countdown { font-size: 1.5rem; }
  }
</style>
{% endblock %}

{% block content %}
<!-- Countdown on top with background image -->
<div class="countdown-hero">
  <div class="overlay"></div>
  <div class="countdown-content">
    <h1>MANCHESTER BIG EVENT 2026</h1>
    <div class="countdown-box">
      <div id="manchesterCountdown" class="countdown"></div>
    </div>
  </div>
</div>

<!-- Flier image below -->
<div class="flier-section">
  <img src="{% static 'images/img3_1' %}" alt="Manchester Event Flier with QR Code">
</div>
{% endblock %}

{% block extra_js %}
<script>
  function startManchesterCountdown() {
    const countdownEl = document.getElementById('manchesterCountdown');
    if (!countdownEl) return;
    const eventDate = new Date(2026, 7, 13, 9, 0, 0);
    const timer = setInterval(() => {
      const now = new Date();
      const distance = eventDate - now;
      if (distance < 0) {
        clearInterval(timer);
        countdownEl.innerHTML = "🔥 EVENT STARTED! 🔥";
        return;
      }
      const days = Math.floor(distance / (1000 * 60 * 60 * 24));
      const hours = Math.floor((distance % 86400000) / 3600000);
      const mins = Math.floor((distance % 3600000) / 60000);
      const secs = Math.floor((distance % 60000) / 1000);
      countdownEl.innerHTML = `${days}d ${hours}h ${mins}m ${secs}s`;
    }, 1000);
  }
  startManchesterCountdown();
</script>
{% endblock %}
